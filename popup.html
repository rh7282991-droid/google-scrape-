<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Google Lead Scraper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Google Lead Scraper</h1>
    <span id="count" class="badge">0 leads</span>
  </header>

  <section class="status" id="status">Ready.</section>

  <!-- Live progress -->
  <section class="progress-box" id="progressBox" style="display:none;">
    <div class="progress-header">
      <span class="dot"></span>
      <span id="progressTitle">Working...</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-meta">
      <span>Page <b id="progPage">0</b>/<b id="progPageTotal">0</b></span>
      <span><b id="progFound">0</b> leads</span>
    </div>
    <div class="progress-current" id="progCurrent"></div>
    <!-- Anti-block delay indicator -->
    <div class="delay-info" id="delayInfo" style="display:none;">
      <span class="delay-badge">Delay ×<span id="delayMultiplier">1.0</span></span>
    </div>
  </section>

  <!-- FEATURE 3: Live Preview Panel -->
  <section class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <span>Last 5 Leads</span>
      <button class="refresh-btn" id="refreshPreview" title="Refresh">&#8635;</button>
    </div>
    <div class="preview-list" id="previewList">
      <div class="preview-empty">No leads yet. Start scraping!</div>
    </div>
  </section>

  <section class="controls">
    <details class="field-picker" open>
      <summary>Fields to extract</summary>
      <div class="grid2">
        <label class="chip"><input type="checkbox" id="f_title" /><span>Title</span></label>
        <label class="chip"><input type="checkbox" id="f_url" /><span>URL</span></label>
        <label class="chip"><input type="checkbox" id="f_description" /><span>Description</span></label>
        <label class="chip"><input type="checkbox" id="f_domain" /><span>Domain</span></label>
        <label class="chip"><input type="checkbox" id="f_emails" /><span>Emails</span></label>
        <label class="chip"><input type="checkbox" id="f_phones" /><span>Phones</span></label>
        <label class="chip"><input type="checkbox" id="f_position" /><span>Position</span></label>
        <label class="chip"><input type="checkbox" id="f_query" /><span>Search query</span></label>
      </div>
    </details>

    <button id="scrapeNow" class="primary">Scrape this page</button>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="autoScrape" />
        <span>Auto-scrape on every Google page</span>
      </label>
    </div>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="autoNext" />
        <span>Auto-click "Next page"</span>
      </label>
    </div>

    <div class="row inline">
      <label for="autoMaxPages">Max pages:</label>
      <input type="number" id="autoMaxPages" min="1" max="50" value="5" />
    </div>

    <hr />

    <button id="runDeep" class="secondary">Deep-scrape saved leads (find emails/phones)</button>
    <button id="enrichEmails" class="secondary enrich-btn">&#9993; Email Enrichment (visit websites)</button>

    <hr />

    <div class="actions">
      <button id="exportCsv" class="secondary">Export CSV</button>
      <button id="exportJson" class="secondary">Export JSON</button>
      <button id="recalcScores" class="secondary score-btn">Recalc Scores</button>
      <button id="clear" class="danger">Clear all</button>
    </div>
  </section>

  <footer>
    <small>Tip: open <a href="https://www.google.com/search?q=%22founder%22+site%3Alinkedin.com+dhaka" target="_blank">google.com/search</a>, then click "Scrape this page".</small>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
