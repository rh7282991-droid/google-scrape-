<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Lead Scraper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <img src="assets/logo.svg" alt="Logo" class="logo">
    <h1>Google Lead Scraper</h1>
    <p class="subtitle">Collect leads from Google Maps</p>

    <div class="stats">
      <div class="stat"><span id="totalLeads">0</span><small>Leads</small></div>
      <div class="stat"><span id="totalPhones">0</span><small>Phones</small></div>
      <div class="stat"><span id="totalEmails">0</span><small>Emails</small></div>
    </div>

    <div class="instructions">
      <p><b>How to use:</b></p>
      <ol>
        <li>Open <a href="https://www.google.com/maps" target="_blank">Google Maps</a></li>
        <li>Search: <i>"restaurants in dhaka"</i></li>
        <li>Click <b>Collect Leads</b> below</li>
        <li>Wait for collection to finish</li>
        <li>Export as CSV</li>
      </ol>
    </div>

    <button id="collectBtn" class="btn-primary">Collect Leads from This Page</button>

    <div id="progress" class="progress" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p id="progressText">Collecting...</p>
    </div>

    <div class="export-section">
      <button id="exportCsv" class="btn-secondary">Export CSV</button>
      <button id="exportJson" class="btn-secondary">Export JSON</button>
    </div>

    <button id="clearBtn" class="btn-danger">Clear All Data</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
